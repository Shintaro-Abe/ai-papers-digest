name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write  # OIDC トークン発行に必要

env:
  AWS_REGION: ap-northeast-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/unit/ -v

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Init
        working-directory: terraform/environments/prod
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/environments/prod
        run: terraform apply -auto-approve

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          ECR_URI=$(cd terraform/environments/prod && terraform output -raw ecr_repository_url)
          docker build -t summarizer src/summarizer/
          docker tag summarizer $ECR_URI:latest
          docker push $ECR_URI:latest

      - name: Sync static assets to S3
        run: |
          BUCKET=$(cd terraform/environments/prod && terraform output -raw pages_bucket_name)
          aws s3 sync static/ s3://$BUCKET/assets/ --delete
