name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write  # OIDC トークン発行に必要

env:
  AWS_REGION: ap-northeast-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/unit/ -v

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package and deploy Lambda functions
        run: |
          mkdir -p /tmp/lambda-zips
          LAMBDAS=("collector" "scorer" "deliverer" "feedback" "weight_adjuster" "token_refresher")
          for name in "${LAMBDAS[@]}"; do
            echo "--- Packaging $name ---"
            SRC_DIR="src/lambdas/$name"
            BUILD_DIR="/tmp/lambda-build/$name"
            ZIP_PATH="/tmp/lambda-zips/$name.zip"
            mkdir -p "$BUILD_DIR"
            # Install dependencies if requirements.txt has content
            if grep -q '[a-zA-Z]' "$SRC_DIR/requirements.txt" 2>/dev/null; then
              pip install -r "$SRC_DIR/requirements.txt" -t "$BUILD_DIR" -q
            fi
            cp "$SRC_DIR"/*.py "$BUILD_DIR"/
            # Bundle shared helpers (e.g. pipeline_runs) flat alongside handler.py
            # so handlers can `from pipeline_runs import upsert_run_status`.
            for shared_file in src/shared/*.py; do
              [ -f "$shared_file" ] || continue
              base="$(basename "$shared_file")"
              [ "$base" = "__init__.py" ] && continue
              cp "$shared_file" "$BUILD_DIR/"
            done
            cd "$BUILD_DIR" && zip -r "$ZIP_PATH" . -q && cd -
            echo "--- Deploying $name ---"
            FUNC_NAME="ai-papers-digest-${name//_/-}"
            aws lambda update-function-code \
              --function-name "$FUNC_NAME" \
              --zip-file "fileb://$ZIP_PATH" \
              --query 'FunctionName' --output text
          done

      - name: Build Docker image via CodeBuild (ARM64)
        run: |
          BUILD_ID=$(aws codebuild start-build \
            --project-name ai-papers-digest-build \
            --query 'build.id' --output text)
          echo "CodeBuild started: $BUILD_ID"
          while true; do
            STATUS=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
              --query 'builds[0].buildStatus' --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "SUCCEEDED" ]; then break; fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "FAULT" ] || [ "$STATUS" = "STOPPED" ] || [ "$STATUS" = "TIMED_OUT" ]; then
              echo "CodeBuild failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done

      - name: Sync static assets to S3
        run: |
          BUCKET="ai-papers-digest-pages-${{ secrets.AWS_ACCOUNT_ID }}"
          # 1. Sync everything except auth/ to /assets/
          aws s3 sync static/ "s3://$BUCKET/assets/" --exclude "auth/*" --delete

          # 2. Auth pages: substitute Cognito + CloudFront values into config.js,
          #    then sync to /auth/ at the bucket root (CloudFront serves /auth/* directly).
          POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 \
            --query "UserPools[?Name=='ai-papers-digest-users'].Id | [0]" --output text)
          if [ -z "$POOL_ID" ] || [ "$POOL_ID" = "None" ]; then
            echo "Cognito user pool 'ai-papers-digest-users' not found. Skipping auth page sync."
            exit 0
          fi

          CLIENT_ID=$(aws cognito-idp list-user-pool-clients \
            --user-pool-id "$POOL_ID" \
            --query "UserPoolClients[?ClientName=='ai-papers-digest-users-web'].ClientId | [0]" \
            --output text)
          DOMAIN_PREFIX=$(aws cognito-idp describe-user-pool \
            --user-pool-id "$POOL_ID" \
            --query 'UserPool.Domain' --output text)
          COGNITO_DOMAIN="${DOMAIN_PREFIX}.auth.${AWS_REGION}.amazoncognito.com"
          CLOUDFRONT_DOMAIN=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Comment, 'AI Papers Digest')].DomainName | [0]" \
            --output text)

          mkdir -p /tmp/auth-build
          cp -r static/auth/* /tmp/auth-build/
          sed -i \
            -e "s|__COGNITO_DOMAIN__|$COGNITO_DOMAIN|g" \
            -e "s|__COGNITO_CLIENT_ID__|$CLIENT_ID|g" \
            -e "s|__CLOUDFRONT_DOMAIN__|$CLOUDFRONT_DOMAIN|g" \
            /tmp/auth-build/config.js

          aws s3 sync /tmp/auth-build/ "s3://$BUCKET/auth/" --delete
