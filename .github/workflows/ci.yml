name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write  # OIDC トークン発行に必要

env:
  AWS_REGION: ap-northeast-1

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/

      - name: Mypy
        run: mypy src/lambdas/ --ignore-missing-imports --disable-error-code arg-type --disable-error-code union-attr --disable-error-code return-value

      - name: Pytest
        run: pytest tests/unit/ -v

  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Init
        working-directory: terraform/environments/prod
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform/environments/prod
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/environments/prod
        run: |
          terraform plan \
            -var="alert_email=ci@example.com" \
            -var="pages_bucket_name=ai-papers-digest-pages-${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="github_repository_url=https://github.com/${{ github.repository }}.git" \
            -input=false
