<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{date}} - AI Papers Digest</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="/" class="nav-brand">AI Papers Digest</a>
    </nav>
  </header>

  <main class="container">
    <h1 class="digest-heading">{{date}} のAI論文ダイジェスト</h1>
    <p class="digest-count">{{paper_count}} 件の論文</p>

    <div class="paper-list">
{{paper_cards}}
    </div>
  </main>

  <footer class="footer">
    <p>&copy; AI Papers Digest</p>
  </footer>
</body>
</html>
